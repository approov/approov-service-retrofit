name: Maven Publish

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+' # Matches tags in the form 3.3.0

jobs:
  # Gate the release on the full unit-test suite. Reuses build_and_test.yml so the
  # test definition lives in exactly one place. Publishing only runs if this passes.
  test:
    uses: ./.github/workflows/build_and_test.yml
    secrets: inherit

  maven-publish:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WORKSPACE: "${{ github.workspace }}"
      GIT_BRANCH: "${{ github.ref }}"
      CURRENT_TAG: "${{ github.ref_name }}"
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      PGP_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      PGP_KEY_ID: ${{ secrets.PGP_KEY_ID }}
      GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
    steps:
    - name: Set up Git
      run: git config --global --add safe.directory '*'
      
    - name: Checkout Repository
      uses: actions/checkout@v5

    # Guard: README dependency snippet must match the release tag.
    # The intended release path is release.yml, which auto-bumps README before tagging.
    # This step catches manual tag pushes that bypass that workflow.
    # Once PR #24 merges (adding "Verify CHANGELOG matches tag"), move this step to
    # immediately after that one.
    - name: Verify README matches tag
      run: |
        TAG="${{ github.ref_name }}"
        grep -qF "service.retrofit:${TAG}" README.md \
          || { echo "::error::README.md dependency snippet does not match tag ${TAG}. Use release.yml to tag — it auto-bumps README automatically."; exit 1; }
        echo "README.md dependency version matches tag: ${TAG}"

    # Fail fast if the release tag and the CHANGELOG have drifted, before any
    # build or publish work. The top "## [x.y.z]" entry must match the tag.
    - name: Verify CHANGELOG matches tag
      run: |
        TAG="${{ github.ref_name }}"
        # `|| true` keeps the friendly -z branch reachable: without it, errexit+pipefail
        # would abort here on a missing header before the diagnostic below can run.
        CHANGELOG_VERSION=$(grep -m1 -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+') || true
        if [ -z "$CHANGELOG_VERSION" ]; then
          echo "::error::Could not find a version header (## [x.y.z]) in CHANGELOG.md"
          exit 1
        fi
        if [ "$CHANGELOG_VERSION" != "$TAG" ]; then
          echo "::error::CHANGELOG.md top entry ($CHANGELOG_VERSION) does not match release tag ($TAG). Update CHANGELOG.md before tagging."
          exit 1
        fi
        echo "CHANGELOG.md top entry matches tag: $TAG"

    - name: Set Up Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin' # Use Eclipse Temurin distribution
        java-version: '21'      # Use Java 21 for Android builds
    
    - name: Install Android SDK
      run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl
          mkdir -p $ANDROID_HOME/cmdline-tools
          curl -o android-sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-9123335_latest.zip
          unzip -q android-sdk.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/tools
          rm android-sdk.zip
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$ANDROID_HOME/cmdline-tools/tools/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH" >> $GITHUB_ENV
    - name: Accept Android SDK Licenses
      shell: bash
      run: |
          source $GITHUB_ENV
          yes | sdkmanager --licenses || true
    - name: Install Required SDK Packages
      shell: bash
      run: |
          source $GITHUB_ENV
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
  

    - name: Install GPG
      run: |
          sudo apt-get update
          sudo apt-get install -y gnupg
    
    - name: Import GPG Private Key
      run: |
        echo "${{ secrets.GPG_PRIVATE_KEY }}" > private.key
        gpg --batch --import private.key
        rm private.key

    - name: Trust GPG Key
      run: |
        KEY_ID=$(gpg --list-keys --with-colons | grep pub | cut -d: -f5)
        echo -e "trust\n5\ny\nquit" | gpg --batch --yes --command-fd 0 --edit-key $KEY_ID
    
    # Bake the release version (the git tag) into the AAR so the runtime user
    # property reports it, e.g. "approov-service-retrofit/3.5.7". The tag is the
    # same value used for the pom and artifact names, keeping them in lockstep.
    - name: Build AAR
      run:  ./gradlew assembleRelease -PapproovServiceVersion=${{ github.ref_name }}

    - name: Create Package
      run: cd .maven && ./build-and-sign.sh

    - name: Publish Package
      run: cd .maven && ./maven-publish.sh
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: full-repo-artifact-${{ github.ref_name }}
        path: ${{ github.workspace }}
